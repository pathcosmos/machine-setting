# Profile: Cloud Server
# For cloud VMs / containers where host provides drivers and system packages.
# Skips all sudo-required operations (driver, CUDA, kernel tuning, apt repos).
# Installs only user-space tools: Python venv, Node.js, Java, shell config.

PACKAGE_GROUPS="core data web"
GPU_PACKAGES=true
INSTALL_NODE=true
INSTALL_JAVA=true

# Cloud mode: skip all privileged operations
CLOUD_MODE=true
INSTALL_NVIDIA=false
NVIDIA_SYSTEM_TOOLS=false
NVIDIA_KERNEL_TUNING=false
