# Profile: NGC Container (NVIDIA B200 etc.)
# NV custom-built torch/flash_attn in system site-packages → symlink into venv
# Do NOT pip install torch/flash_attn — use system builds via --nv-link

PACKAGE_GROUPS="core data web"
GPU_PACKAGES=true
NV_LINK=true
INSTALL_NODE=false
INSTALL_JAVA=false

# NV custom packages to symlink from system site-packages
# (space-separated, dist-info auto-linked)
NV_LINK_PACKAGES="torch torchvision torchaudio triton flash_attn transformer_engine"
