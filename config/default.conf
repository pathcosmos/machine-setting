# Machine Setting - Default Configuration
# Override in config/machine.conf (gitignored) for machine-specific settings

PYTHON_VERSION="3.12"
VENV_DEFAULT_PATH="$HOME/ai-env"
INSTALL_NODE=true
INSTALL_JAVA=true
NODE_VERSION="lts"
JAVA_VERSION="21"
UPDATE_CHECK_INTERVAL=86400    # 24 hours in seconds

# Package groups to install (space-separated)
PACKAGE_GROUPS="core data web"     # gpu/cpu auto-selected by hardware detection
