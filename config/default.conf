# Machine Setting - Default Configuration
# Override in config/machine.conf (gitignored) for machine-specific settings

PYTHON_VERSION="3.12"
VENV_DEFAULT_PATH="$HOME/ai-env"
INSTALL_NODE=true
INSTALL_JAVA=true
NODE_VERSION="lts"
JAVA_VERSION="21"
UPDATE_CHECK_INTERVAL=86400    # 24 hours in seconds

# Package groups to install (space-separated)
PACKAGE_GROUPS="core data web"     # gpu/cpu auto-selected by hardware detection

# --- NVIDIA GPU Stack ---
INSTALL_NVIDIA=true                # Set false to skip entire NVIDIA stage
NVIDIA_DRIVER_VERSION=""           # empty = auto-detect recommended driver
NVIDIA_CUDA_VERSION="13-0"         # CUDA 13.0 (unified); use "12-6" etc. in machine.conf for older GPUs
NVIDIA_OPEN_KERNEL="auto"         # auto | true | false (open vs proprietary kernel modules)
NVIDIA_ENTERPRISE=false            # true = install DCGM, Fabric Manager, GDS, peermem
NVIDIA_NO_DRIVER=false             # true = skip driver install (CUDA/cuDNN only)
NVIDIA_CONTAINER_TOOLKIT=true      # Install NVIDIA Container Toolkit (if Docker present)
NVIDIA_SYSTEM_TOOLS=true           # Install build-essential, cmake, numactl, hwloc, nvtop, etc.
NVIDIA_KERNEL_TUNING=true          # Apply sysctl/limits tuning for GPU workloads

# --- Cloud / Container Mode ---
CLOUD_MODE=false                   # true = skip all sudo/system-level operations
                                   # Auto-detected if no sudo available or running in container
